name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend - FastAPI tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: obrail
          POSTGRES_PASSWORD: obrail
          POSTGRES_DB: obrail
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Check required dataset and models
        run: |
          test -f data/eu_trips_v2.csv
          test -f models/classification_substitution_avion.joblib
          test -f models/encoders.joblib
          test -f models/regression_co2.joblib

      - name: Compile backend package
        run: python -m compileall backend/app

      - name: Seed database
        env:
          DATABASE_URL: postgresql://obrail:obrail@localhost:5432/obrail
          CSV_PATH: data/eu_trips_v2.csv
        run: python backend/seed.py

      - name: Run backend tests
        run: python -m pytest -q backend/tests

  frontend:
    name: Frontend - Vite tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker - Compose validation and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - backend
      - frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose -f docker/docker-compose.yml config --quiet

      - name: Build backend and frontend images
        run: docker compose -f docker/docker-compose.yml build

  e2e:
    name: E2E - Playwright browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - backend
      - frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend and Playwright dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Start Docker stack
        run: docker compose -f docker/docker-compose.yml up -d --build frontend

      - name: Run Playwright E2E tests
        run: python -m pytest -q frontend/tests/test_e2e.py

      - name: Show Docker logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.yml logs --tail=120

      - name: Stop Docker stack
        if: always()
        run: docker compose -f docker/docker-compose.yml down
